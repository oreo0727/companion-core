services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: companion_core
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - companion-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d companion_core"]
      interval: 5s
      timeout: 5s
      retries: 10

  companion-api:
    build:
      context: .
      dockerfile: Companion.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=companion_core;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  companion-worker:
    build:
      context: .
      dockerfile: Companion.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=companion_core;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy
      companion-api:
        condition: service_started

volumes:
  companion-postgres-data:
