name: companion-core

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: companion_core
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - companion-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d companion_core"]
      interval: 5s
      timeout: 5s
      retries: 10

  companion-api:
    build:
      context: .
      dockerfile: Companion.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=companion_core;Username=postgres;Password=postgres
      Cors__AllowedOrigins__0: http://localhost:3000
      Cors__AllowedOrigins__1: http://127.0.0.1:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  companion-worker:
    build:
      context: .
      dockerfile: Companion.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=companion_core;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy
      companion-api:
        condition: service_started

  companion-web:
    build:
      context: .
      dockerfile: Companion.Web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      companion-api:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - companion-ollama-data:/root/.ollama

volumes:
  companion-postgres-data:
  companion-ollama-data:
